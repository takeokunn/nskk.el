name: Bench

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: purcell/setup-emacs@8415786a52b3a84babd7ffc92a802b06e3780c17 # master
        with:
          version: '30.1'
      - name: Byte compile
        run: make compile
      - name: Run benchmarks
        run: make bench
